<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}</title>
    <meta name="description" content="Curated Cyberpunk 2077 mod list and console command database — search, filter and copy commands for items, clothes and vehicles.">
    <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <div class="scanlines" aria-hidden="true"></div>
    {{ block "main" . }}{{ end }}

    <script>
        // Live clock — real data, not set dressing
        (function () {
            const el = document.getElementById('hudClock');
            if (!el) return;
            function tick() {
                el.textContent = new Date().toLocaleTimeString('en-GB', { hour12: false });
            }
            tick();
            setInterval(tick, 1000);
        })();

        // "/" focuses search, Escape clears it
        (function () {
            const input = document.querySelector('[data-search]');
            if (!input) return;
            document.addEventListener('keydown', (e) => {
                if (e.key === '/' && document.activeElement !== input) {
                    e.preventDefault();
                    input.focus();
                } else if (e.key === 'Escape' && document.activeElement === input) {
                    input.value = '';
                    input.dispatchEvent(new Event('input', { bubbles: true }));
                    input.blur();
                }
            });
        })();
    </script>
</body>
</html>
