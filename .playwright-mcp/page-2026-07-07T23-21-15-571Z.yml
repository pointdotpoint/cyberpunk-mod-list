          - generic [ref=f5e8722]:
            - generic [ref=f5e8723]: "[ MOD_ID: 064 ]"
            - heading "I you are familiar with Mod Organizer2, it fully works with Cyberpunk 2077 and I highly recommend using it. Manual install is obviously fine but Mo2 will make things easier and offers extra features like having different mod profiles per character. The main install folder of cyberpunk is never touched, all mods run from another location on your drive so it's literally impossible to break your game." [level=3] [ref=f5e8724]
            - generic [ref=f5e8725]: "STATUS: ENABLED [Y]"
            - generic [ref=f5e8726]: "Descr: With Mo2 you can easily disable/enable mods with a checkmark, installing is an auto-download from nexus and doubleclicking. It's a timesaver and it will save you some headaches if you don't organize your mods well with a manual installation. It also makes updating and checking for updates easier."
